<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>哈里斯—托达罗人口迁移模型动态模拟</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; background: #f5f7fb; color: #1f2937; }
    header { padding: 22px 28px; background: linear-gradient(135deg, #1f3a5f, #356a9a); color: #fff; }
    header h1 { margin: 0 0 8px; font-size: 24px; font-weight: 700; }
    header p { margin: 0; font-size: 14px; opacity: 0.92; line-height: 1.6; }
    .container { display: grid; grid-template-columns: 340px 1fr; gap: 18px; padding: 18px; max-width: 1320px; margin: 0 auto; }
    .panel { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); border: 1px solid #e5e7eb; }
    .left { padding: 18px; height: fit-content; position: sticky; top: 16px; }
    .section-title { font-size: 17px; font-weight: 700; margin: 0 0 14px; color: #17324d; }
    .form-grid { display: grid; gap: 12px; }
    label { display: block; font-size: 13px; color: #374151; margin-bottom: 5px; }
    input { width: 100%; padding: 9px 10px; border: 1px solid #cbd5e1; border-radius: 9px; font-size: 14px; outline: none; background: #fbfdff; }
    input:focus { border-color: #356a9a; box-shadow: 0 0 0 3px rgba(53, 106, 154, 0.14); }
    button { width: 100%; margin-top: 14px; padding: 11px 12px; border: none; border-radius: 10px; background: #245b87; color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
    button:hover { background: #1f4f75; }
    .results { margin-top: 18px; padding: 14px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 13px; line-height: 1.65; }
    .results b { color: #0f3658; }
    .status { margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13px; line-height: 1.55; }
    .positive { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .neutral { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .negative { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .right { padding: 18px; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; }
    .chart-title { font-size: 15px; font-weight: 700; color: #17324d; margin: 0 0 8px; }
    canvas { width: 100%; height: 270px; display: block; background: #ffffff; border-radius: 8px; }
    .note { margin-top: 16px; padding: 14px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 13px; line-height: 1.75; color: #475569; }
    .formula { font-family: "Times New Roman", serif; color: #111827; background: #eef6ff; border-radius: 8px; padding: 8px 10px; margin: 8px 0; display: inline-block; }
    @media (max-width: 980px) { .container { grid-template-columns: 1fr; } .left { position: static; } .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>哈里斯—托达罗人口迁移模型动态模拟</h1>
    <p>通过参数调节观察城市就业概率、城市预期收入、迁移净收益与均衡迁移率的变化，用于《人口经济学》数字教材中“人口城市化、人口迁移与区域经济”章节的理论模型演示。</p>
  </header>

  <main class="container">
    <aside class="panel left">
      <h2 class="section-title">参数输入</h2>
      <div class="form-grid">
        <div><label>城市正规部门工资 Wu</label><input id="Wu" type="number" value="80000" step="1000"></div>
        <div><label>农村工资 Wr</label><input id="Wr" type="number" value="40000" step="1000"></div>
        <div><label>城市非正规部门收入 Wb</label><input id="Wb" type="number" value="30000" step="1000"></div>
        <div><label>迁移成本 C</label><input id="C" type="number" value="5000" step="500"></div>
        <div><label>贴现率 r</label><input id="r" type="number" value="0.05" step="0.01"></div>
        <div><label>城市正规就业岗位 Lu</label><input id="Lu" type="number" value="100000" step="10000"></div>
        <div><label>农村人口规模 Nr</label><input id="Nr" type="number" value="1000000" step="100000"></div>
        <div><label>初始迁移率 M</label><input id="M0" type="number" value="0.10" step="0.01" min="0.001" max="1"></div>
      </div>
      <button onclick="updateModel()">计算并绘图</button>
      <div class="results" id="results"></div>
      <div id="status" class="status"></div>
    </aside>

    <section class="panel right">
      <div class="charts">
        <div class="chart-card"><h3 class="chart-title">迁移率与城市就业概率</h3><canvas id="chart1" width="520" height="300"></canvas></div>
        <div class="chart-card"><h3 class="chart-title">迁移率与城市预期收入</h3><canvas id="chart2" width="520" height="300"></canvas></div>
        <div class="chart-card"><h3 class="chart-title">迁移率与迁移净收益</h3><canvas id="chart3" width="520" height="300"></canvas></div>
        <div class="chart-card"><h3 class="chart-title">城市工资变化对均衡迁移率的影响</h3><canvas id="chart4" width="520" height="300"></canvas></div>
      </div>
      <div class="note">
        <b>模型说明：</b><br>
        城市就业概率：<span class="formula">P = Lu / (Lu + MNr)</span><br>
        城市正规部门预期工资：<span class="formula">E(Wu) = P × Wu</span><br>
        迁移净收益：<span class="formula">P × Wu − Wr − rC</span><br>
        当迁移净收益大于 0 时，农村劳动力存在继续迁入城市的动力；当其等于 0 时，达到迁移均衡。
      </div>
    </section>
  </main>

  <script>
    function num(id) { const v = parseFloat(document.getElementById(id).value); return Number.isFinite(v) ? v : 0; }
    function linspace(start, end, n) { const arr = []; const step = (end - start) / (n - 1); for (let i = 0; i < n; i++) arr.push(start + step * i); return arr; }
    function fmt(x, d = 4) { if (!Number.isFinite(x)) return "无效"; return x.toFixed(d); }

    function drawChart(canvasId, series, opts) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const margin = { left: 58, right: 18, top: 20, bottom: 44 };
      const pw = W - margin.left - margin.right;
      const ph = H - margin.top - margin.bottom;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, W, H);
      let xs = [], ys = [];
      series.forEach(s => s.data.forEach(p => { if (Number.isFinite(p.x) && Number.isFinite(p.y)) { xs.push(p.x); ys.push(p.y); } }));
      if (opts.extraY !== undefined && Number.isFinite(opts.extraY)) ys.push(opts.extraY);
      if (opts.extraX !== undefined && Number.isFinite(opts.extraX)) xs.push(opts.extraX);
      const minX = opts.minX ?? Math.min(...xs);
      const maxX = opts.maxX ?? Math.max(...xs);
      let minY = opts.minY ?? Math.min(...ys);
      let maxY = opts.maxY ?? Math.max(...ys);
      if (minY === maxY) { minY -= 1; maxY += 1; }
      const yPad = (maxY - minY) * 0.08;
      minY -= yPad; maxY += yPad;
      const xMap = x => margin.left + ((x - minX) / (maxX - minX)) * pw;
      const yMap = y => margin.top + ph - ((y - minY) / (maxY - minY)) * ph;
      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 1;
      ctx.font = "12px Microsoft YaHei, Arial";
      ctx.fillStyle = "#64748b";
      for (let i = 0; i <= 5; i++) {
        const gx = margin.left + (pw / 5) * i;
        const gy = margin.top + (ph / 5) * i;
        ctx.beginPath(); ctx.moveTo(gx, margin.top); ctx.lineTo(gx, margin.top + ph); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(margin.left, gy); ctx.lineTo(margin.left + pw, gy); ctx.stroke();
        const xv = minX + (maxX - minX) * i / 5;
        const yv = maxY - (maxY - minY) * i / 5;
        ctx.fillText(xv.toFixed(opts.xDigits ?? 2), gx - 12, H - 18);
        ctx.fillText(yv.toFixed(opts.yDigits ?? 2), 6, gy + 4);
      }
      ctx.strokeStyle = "#334155";
      ctx.beginPath(); ctx.moveTo(margin.left, margin.top); ctx.lineTo(margin.left, margin.top + ph); ctx.lineTo(margin.left + pw, margin.top + ph); ctx.stroke();
      if (opts.hLine !== undefined && Number.isFinite(opts.hLine)) {
        ctx.strokeStyle = "#9ca3af"; ctx.setLineDash([6, 5]);
        const y = yMap(opts.hLine); ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + pw, y); ctx.stroke(); ctx.setLineDash([]);
      }
      if (opts.vLine !== undefined && Number.isFinite(opts.vLine)) {
        ctx.strokeStyle = "#9ca3af"; ctx.setLineDash([6, 5]);
        const x = xMap(opts.vLine); ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + ph); ctx.stroke(); ctx.setLineDash([]);
      }
      const colors = ["#2563eb", "#dc2626", "#059669", "#7c3aed"];
      series.forEach((s, idx) => {
        ctx.strokeStyle = s.color || colors[idx % colors.length]; ctx.lineWidth = 2; ctx.beginPath();
        s.data.forEach((p, i) => { const x = xMap(p.x), y = yMap(p.y); if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
        ctx.stroke();
      });
      ctx.fillStyle = "#334155"; ctx.font = "13px Microsoft YaHei, Arial"; ctx.fillText(opts.xLabel || "", margin.left + pw / 2 - 30, H - 4);
      ctx.save(); ctx.translate(14, margin.top + ph / 2 + 35); ctx.rotate(-Math.PI / 2); ctx.fillText(opts.yLabel || "", 0, 0); ctx.restore();
      let lx = margin.left + 8, ly = margin.top + 10;
      ctx.font = "12px Microsoft YaHei, Arial";
      series.forEach((s, idx) => {
        ctx.strokeStyle = s.color || colors[idx % colors.length]; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 22, ly); ctx.stroke();
        ctx.fillStyle = "#334155"; ctx.fillText(s.name, lx + 28, ly + 4); ly += 18;
      });
    }

    function updateModel() {
      const Wu = num("Wu"), Wr = num("Wr"), Wb = num("Wb"), C = num("C"), r = num("r"), Lu = num("Lu"), Nr = num("Nr"), M0 = num("M0");
      if (Nr <= 0 || Lu <= 0 || r <= 0) { document.getElementById("results").innerHTML = "请确保 Nr、Lu、r 均大于 0。"; return; }
      const P0 = Lu / (Lu + M0 * Nr);
      const expectedFormal = P0 * Wu;
      const expectedInformal = P0 * Wu + (1 - P0) * Wb;
      const migrationGain = expectedFormal - Wr - r * C;
      const denom = r * C + Wr;
      const Mstar = denom !== 0 ? ((Wu - Wr - r * C) / denom) * (Lu / Nr) : NaN;
      const denomB = r * C - (Wb - Wr);
      const MstarB = denomB !== 0 ? ((Wu - Wr - r * C) / denomB) * (Lu / Nr) : NaN;
      const migrants = M0 * Nr;
      document.getElementById("results").innerHTML = `
        <b>当前就业概率 P：</b>${fmt(P0, 4)}<br>
        <b>城市正规部门预期工资 P×Wu：</b>${fmt(expectedFormal, 2)}<br>
        <b>含非正规部门预期收入：</b>${fmt(expectedInformal, 2)}<br>
        <b>迁移净收益 P×Wu − Wr − rC：</b>${fmt(migrationGain, 2)}<br>
        <b>不考虑非正规部门的均衡迁移率 M*：</b>${fmt(Mstar, 4)}<br>
        <b>考虑非正规部门后的均衡迁移率 Mb*：</b>${fmt(MstarB, 4)}<br>
        <b>当前迁入城市人口 M×Nr：</b>${fmt(migrants, 0)}<br>
        <b>城市正规就业岗位 Lu：</b>${fmt(Lu, 0)}
      `;
      const status = document.getElementById("status");
      if (migrationGain > 1e-6) { status.className = "status positive"; status.textContent = "判断：迁移净收益大于 0，存在继续迁移动力。"; }
      else if (Math.abs(migrationGain) <= 1e-6) { status.className = "status neutral"; status.textContent = "判断：迁移净收益约等于 0，接近迁移均衡。"; }
      else { status.className = "status negative"; status.textContent = "判断：迁移净收益小于 0，迁移动力不足。"; }
      const Mvals = linspace(0.001, 1.0, 300);
      const Pvals = Mvals.map(M => Lu / (Lu + M * Nr));
      const expectedVals = Pvals.map(P => P * Wu);
      const expectedValsB = Pvals.map(P => P * Wu + (1 - P) * Wb);
      const gainVals = expectedVals.map(E => E - Wr - r * C);
      drawChart("chart1", [{ name: "就业概率 P", data: Mvals.map((M, i) => ({ x: M, y: Pvals[i] })) }], { xLabel: "迁移率 M", yLabel: "就业概率 P", vLine: M0, minX: 0, maxX: 1, yDigits: 2 });
      drawChart("chart2", [{ name: "正规部门预期工资", data: Mvals.map((M, i) => ({ x: M, y: expectedVals[i] })) }, { name: "含非正规部门预期收入", data: Mvals.map((M, i) => ({ x: M, y: expectedValsB[i] })) }], { xLabel: "迁移率 M", yLabel: "预期收入", hLine: Wr + r * C, minX: 0, maxX: 1, yDigits: 0 });
      drawChart("chart3", [{ name: "迁移净收益", data: Mvals.map((M, i) => ({ x: M, y: gainVals[i] })) }], { xLabel: "迁移率 M", yLabel: "净收益", hLine: 0, vLine: M0, minX: 0, maxX: 1, yDigits: 0 });
      const WuVals = linspace(Wu * 0.5, Wu * 1.5, 160);
      const MstarVals = WuVals.map(w => ((w - Wr - r * C) / (r * C + Wr)) * (Lu / Nr));
      drawChart("chart4", [{ name: "均衡迁移率 M*", data: WuVals.map((w, i) => ({ x: w, y: MstarVals[i] })) }], { xLabel: "城市正规部门工资 Wu", yLabel: "均衡迁移率 M*", hLine: 0, xDigits: 0, yDigits: 3 });
    }
    document.querySelectorAll("input").forEach(el => el.addEventListener("input", updateModel));
    updateModel();
  </script>
</body>
</html>
